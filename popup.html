<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>PanSub</title>
  <style>
    :root {
      --ink: #f8fafc;
      --muted: #a8b3c4;
      --line: rgba(255,255,255,.12);
      --accent: #6ea8ff;
      --bg: #111827;
    }

    * {
      box-sizing: border-box;
    }

    body {
      width: 292px;
      margin: 0;
      padding: 16px;
      color: var(--ink);
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    header {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 14px;
    }

    .mark {
      display: grid;
      width: 36px;
      height: 36px;
      place-items: center;
      border-radius: 8px;
      background: var(--accent);
      color: #08111f;
      font-weight: 900;
    }

    h1 {
      margin: 0;
      font-size: 17px;
    }

    .status {
      margin: 3px 0 0;
      color: var(--muted);
      font-size: 12px;
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 0;
      border-top: 1px solid var(--line);
    }

    label,
    .label {
      font-size: 14px;
      font-weight: 650;
    }

    select {
      min-width: 128px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 7px 8px;
      color: var(--ink);
      background: #1f2937;
    }

    input[type="checkbox"] {
      width: 42px;
      height: 24px;
      accent-color: var(--accent);
    }

    button {
      width: 100%;
      margin-top: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      color: var(--ink);
      background: #1f2937;
      cursor: pointer;
      font-weight: 700;
    }

    button:hover {
      border-color: var(--accent);
    }
  </style>
</head>
<body>
  <header>
    <div class="mark">P</div>
    <div>
      <h1>PanSub</h1>
      <p class="status" id="status" data-i18n="statusReady">Canvas / Panopto subtitles</p>
    </div>
  </header>

  <div class="row">
    <span class="label" data-i18n="showSubtitles">Show subtitles</span>
    <input type="checkbox" id="enabled">
  </div>

  <div class="row">
    <label for="interfaceLanguage" data-i18n="interfaceLanguage">Interface</label>
    <select id="interfaceLanguage">
      <option value="en" data-i18n="languageEnglish">English</option>
      <option value="zh-CN" data-i18n="languageChinese">中文</option>
    </select>
  </div>

  <div class="row">
    <label for="displayMode" data-i18n="mode">Mode</label>
    <select id="displayMode">
      <option value="bilingual" data-i18n="displayBilingual">Bilingual</option>
      <option value="translation" data-i18n="displayTranslation">Translation only</option>
      <option value="original" data-i18n="displayOriginal">Original only</option>
    </select>
  </div>

  <div class="row">
    <label for="subtitlePosition" data-i18n="position">Position</label>
    <select id="subtitlePosition">
      <option value="auto" data-i18n="positionAuto">Auto</option>
      <option value="video-bottom" data-i18n="positionVideoBottom">Video bottom</option>
      <option value="page-bottom" data-i18n="positionPageBottom">Page bottom</option>
      <option value="follow-caption" data-i18n="positionFollowCaptionShort">Follow caption</option>
      <option value="manual" data-i18n="positionManual">Manual drag</option>
    </select>
  </div>

  <button id="openOptions" type="button" data-i18n="openSettings">Open settings</button>

  <script src="popup.js"></script>
</body>
</html>
